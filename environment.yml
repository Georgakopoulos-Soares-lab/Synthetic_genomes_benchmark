name: syn_bench

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.10
  - pip

  # workflow / bio
  - snakemake=7.18.0
  - bedtools=2.31.1

  # python libs commonly used in analysis + pipelines
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib

  # bio python libs
  - biopython
  - pysam
  - pybedtools
  - pyfaidx


  - pip:
      - altair==4.0.0
